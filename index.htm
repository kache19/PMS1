<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <link rel="icon" type="image/jpg" href="companyLogo.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            animation: fadeIn 2s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .contacts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .contacts a {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }
        .contacts a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .contacts a.whatsapp {
            background: rgba(34, 197, 94, 0.8);
        }
        .contacts a.whatsapp:hover {
            background: rgba(34, 197, 94, 1);
        }
        .contacts i {
            margin-right: 10px;
            font-size: 1.2em;
        }
        .animation {
            margin-top: 30px;
        }
        svg {
            width: 200px;
            height: 200px;
        }
        .person {
            animation: bounce 3s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .arm {
            animation: type 1s infinite;
        }
        @keyframes type {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(-5deg) translateY(-2px); }
        }
        .code-sign {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particle-float 4s ease-in-out infinite;
        }
        .particle:nth-child(1) { width: 4px; height: 4px; top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 6px; height: 6px; top: 40%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(3) { width: 3px; height: 3px; top: 60%; left: 20%; animation-delay: 2s; }
        .particle:nth-child(4) { width: 5px; height: 5px; top: 80%; left: 70%; animation-delay: 3s; }
        @keyframes particle-float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 1; }
        }
        .scrolling-code {
            animation: scroll-up 3s linear infinite;
        }
        @keyframes scroll-up {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="container">
        <h1>Sorry The System is Under Maintenance</h1>
        <p>Developers are undergoing maintenance on the system. The system will be back soon.</p>
        <div class="contacts">
            <a href="kachehubinfo@gmail.com">
                <i class="fas fa-envelope"></i> Email
            </a>
            <a href="https://wa.me/+25589178891" class="whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>
        <div class="animation">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- PC -->
                <rect x="50" y="120" width="100" height="60" fill="#333" rx="5"/>
                <rect x="60" y="130" width="80" height="40" fill="#000"/>
                <rect x="70" y="140" width="60" height="20" fill="#222"/>
                <!-- Scrolling code on screen -->
                <g class="scrolling-code">
                    <text x="65" y="150" fill="#00ff00" font-size="6" font-family="monospace">function init() {</text>
                    <text x="65" y="160" fill="#ff0000" font-size="6" font-family="monospace">  console.log('Coding...');</text>
                    <text x="65" y="170" fill="#00ff00" font-size="6" font-family="monospace">}</text>
                    <text x="65" y="180" fill="#ff0000" font-size="6" font-family="monospace">const app = express();</text>
                </g>
                <!-- Keyboard -->
                <rect x="55" y="180" width="90" height="10" fill="#666" rx="2"/>
                <rect x="60" y="185" width="80" height="2" fill="#999"/>
                <!-- Chair -->
                <rect x="85" y="135" width="30" height="10" fill="#8B4513" rx="2"/>
                <rect x="87" y="125" width="26" height="15" fill="#A0522D"/>
                <!-- Person -->
                <g class="person">
                    <!-- Head -->
                    <circle cx="100" cy="85" r="12" fill="#f4a261"/>
                    <!-- Body -->
                    <rect x="92" y="97" width="16" height="20" fill="#2a9d8f"/>
                    <!-- Arms (typing) -->
                    <rect x="88" y="107" width="12" height="5" fill="#f4a261"/>
                    <rect x="100" y="107" width="12" height="5" fill="#f4a261" class="arm"/>
                    <!-- Legs (sitting) -->
                    <rect x="94" y="117" width="5" height="10" fill="#264653"/>
                    <rect x="101" y="117" width="5" height="10" fill="#264653"/>
                </g>
                <!-- </> sign -->
                <text x="30" y="50" fill="#00ff00" font-size="20" class="code-sign"></></text>
            </svg>
        </div>
    </div>
</body>
</html>
